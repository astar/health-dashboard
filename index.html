<title>🔒 Doctor — dashboard</title>
<style>
*{box-sizing:border-box}
body{margin:0;height:100vh;background:#0d1117;color:#e6edf3;

#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;padding:20px}
#gate h1{font-size:20px;margin:0}
#gate .lock{font-size:42px}

#gate button{padding:12px;border-radius:10px;border:0;background:#3b82f6;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
#gate label{font-size:13px;color:#8b98a9;display:flex;gap:7px;align-items:center}
#err{color:#f87171;font-size:13px;min-height:18px}
#frame{display:none;border:0;width:100vw;height:100vh}
</style></head>
<body>
<div id="gate">
  <div class="lock">🔒</div>
  <h1>Doctor — dashboard</h1>

    <label><input id="remember" type="checkbox"> Zapamatovat na tomto zařízení</label>
    <button type="submit">Odemknout</button>
    <div id="err"></div>
  </form>
</div>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(pw){
  const bytes=b64(BLOB);
  const salt=bytes.slice(0,16), iv=bytes.slice(16,28), ct=bytes.slice(28);
  const base=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:salt,iterations:ITER,hash:"SHA-256"},base,
    {name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
  return new TextDecoder().decode(pt);
}
async function tryOpen(pw,fromStore){
  try{
    const html=await decrypt(pw);
    if(document.getElementById("remember").checked||fromStore) localStorage.setItem(KEYNAME,pw);
    const f=document.getElementById("frame");
    f.srcdoc=html; f.style.display="block";
    document.getElementById("gate").style.display="none";
  }catch(e){
    if(fromStore){localStorage.removeItem(KEYNAME);return;}
    document.getElementById("err").textContent="Špatné heslo.";
  }
}
document.getElementById("f").addEventListener("submit",e=>{e.preventDefault();tryOpen(document.getElementById("pw").value,false);});
const saved=localStorage.getItem(KEYNAME);
if(saved){document.getElementById("remember").checked=true;tryOpen(saved,true);}
</script>
